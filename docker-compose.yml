version: "3.9"
services:
  # ── PostgreSQL + TimescaleDB ────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: routeon-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - routeon-net
  # ── FastAPI 백엔드 ──────────────────────────────
  backend:
    build: ./backend
    container_name: routeon-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TMAP_APP_KEY=${TMAP_APP_KEY}
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
      - KAKAO_JS_KEY=${KAKAO_JS_KEY}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - routeon-net
  # ── Redis ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: routeon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - routeon-net
  # ── Nginx ───────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: routeon-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - routeon-net
  # ── Code Server (브라우저 VS Code) ──────────────
  code-server:
    image: codercom/code-server:latest
    container_name: routeon-code-server
    restart: unless-stopped
    ports:
      - "8443:8080"
    volumes:
      - /opt/routeon:/home/coder/project
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD}
    user: "0"
    networks:
      - routeon-net
volumes:
  db_data:
networks:
  routeon-net:
    driver: bridge